name: Java CI — Maven (Java 17)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build and package (Java 17)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Cache Maven local repository
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Build (maven package)
        run: mvn -B -V -DskipTests=false clean package

      - name: Run JAR (smoke test)
        run: |
          set -e
          JAR=$(ls target/*.jar | head -n1 || true)
          if [ -n "$JAR" ]; then
            echo "Running produced jar: $JAR"
            java -jar "$JAR" &
            JPID=$!
            # wait a short time to let app start and then kill (this is a simple smoke test)
            sleep 2
            kill "$JPID" || true
          else
            echo "No jar produced in target/; skipping smoke run"
          fi

      - name: Upload JAR artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: packaged-jar
          path: target/*.jar

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-reports
          path: target/surefire-reports/**

# This workflow was generated by reading the repository's pom.xml (Java 17).
# It runs `mvn clean package`, performs a tiny smoke run of the produced JAR if any,
# and uploads the produced JAR and any test reports. If your project has tests
# or needs additional steps (code coverage, linting, publishing), tell me and
# I will add them.
